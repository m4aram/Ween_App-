name: ween
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  image_picker: ^1.0.4
  # Firebase - نضيفها الآن
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1  # ← أضف هذا
  google_maps_flutter: ^2.6.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"  # ← لون الخلفية
  adaptive_icon_foreground: "assets/images/logo.jpg"  # ← الصورة تكبر
flutter:
  uses-material-design: true
  assets:
      - assets/images/
